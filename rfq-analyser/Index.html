<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>RFQ Analyser</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#000;color:#1a1a1a;min-height:100vh;padding:1rem 1rem 0}
.container{max-width:860px;margin:0 auto}
header{margin-bottom:1.5rem}
.logo{height:160px;width:auto}
header h1 { font-size: 20px; font-weight: 600; color: #fff; }
header p { font-size: 13px; color: #aaa; margin-top: 2px; }
.card{background:#fff;border-radius:14px;border:1px solid #e8e6e0;padding:1.5rem;margin-bottom:1.25rem}
.lbl{font-size:11px;font-weight:600;color:#888;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.6rem}
textarea{width:100%;min-height:160px;padding:.75rem 1rem;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;color:#1a1a1a;background:#fafafa;resize:vertical;line-height:1.6}
textarea:focus{outline:none;border-color:#534AB7}
.btn-row{display:flex;gap:10px;margin-top:.85rem;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:.55rem 1.2rem;border:1px solid #ddd;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;background:#fff;color:#1a1a1a}
.btn:hover{background:#f5f4f0}
.btn-p{background:#534AB7;border-color:#534AB7;color:#fff}
.btn-p:hover{background:#3C3489}
.btn-sm{padding:.35rem .85rem;font-size:13px}
.loading{display:flex;align-items:center;gap:10px;font-size:14px;color:#666;padding:.6rem 0}
.spinner{width:18px;height:18px;border:2px solid #ddd;border-top-color:#534AB7;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.err{background:#fff0f0;border:1px solid #fca5a5;border-radius:8px;padding:.7rem 1rem;font-size:13px;color:#b91c1c;margin-top:.75rem}
.sumbar{display:flex;gap:20px;padding:.65rem 1rem;background:#f8f7f3;border-radius:8px;font-size:13px;margin-bottom:1rem;flex-wrap:wrap}
.sum{display:flex;align-items:center;gap:6px}
.matrix{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fc{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:.7rem .95rem;border-left:3px solid #e8e6e0}
.fc.ok{border-left-color:#16a34a}.fc.partial{border-left-color:#d97706}.fc.missing{border-left-color:#dc2626}
.fl{font-size:11px;font-weight:600;color:#888;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.fv{font-size:14px;color:#1a1a1a;line-height:1.4}
.fv.empty{color:#bbb;font-style:italic}
.badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;font-size:9px;font-weight:700;flex-shrink:0}
.bok{background:#dcfce7;color:#15803d}.bpa{background:#fef3c7;color:#b45309}.bmi{background:#fee2e2;color:#b91c1c}
.eh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.eb{background:#f8f7f3;border:1px solid #e8e6e0;border-radius:8px;padding:1rem 1.25rem;font-size:14px;line-height:1.75;white-space:pre-wrap;color:#1a1a1a;min-height:120px}
.price-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:1rem}
.price-table th{text-align:left;font-size:11px;font-weight:600;color:#888;letter-spacing:.07em;text-transform:uppercase;padding:.4rem .5rem;border-bottom:1px solid #e8e6e0}
.price-table td{padding:.45rem .5rem;border-bottom:1px solid #f0ede8;vertical-align:middle}
.price-table input[type=number]{width:60px;text-align:center;padding:4px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.price-controls{display:flex;align-items:center;gap:1.5rem;margin-bottom:1rem;flex-wrap:wrap;padding:.75rem 1rem;background:#f8f7f3;border-radius:8px}
.price-controls label{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.price-controls input[type=number]{width:65px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.price-summary{border-top:1px solid #e8e6e0;margin-top:.5rem;padding-top:.75rem}
.price-summary-row{display:flex;justify-content:space-between;font-size:13px;padding:.2rem 0;color:#555}
.price-summary-row.total{font-size:15px;font-weight:700;color:#1a1a1a;padding-top:.4rem;margin-top:.2rem;border-top:1px solid #e8e6e0}
.price-summary-row.vat{font-size:14px;font-weight:600;color:#534AB7}
.logistics{font-size:12px;color:#888;padding:.4rem 0}
.section-group{margin-bottom:1rem;border:1px solid #e8e6e0;border-radius:10px;overflow:hidden}
.section-header{display:flex;gap:8px;align-items:center;padding:.5rem .75rem;background:#f8f7f3;border-bottom:1px solid #e8e6e0;flex-wrap:wrap}
.section-input{padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;color:#1a1a1a}
.section-input::placeholder{color:#bbb}
.section-products{padding:0 .5rem}
.section-add-row{display:flex;gap:8px;padding:.5rem .75rem;border-top:1px solid #f0ede8;background:#fafaf8;align-items:center;flex-wrap:wrap}
.section-subtotal{font-size:12px;color:#666;padding:.35rem .75rem;text-align:right;border-top:1px solid #f0ede8}
</style>
</head>

<script>
const FIELD_DEFS = <?!= fieldDefsJson ?>;

const PRODUCT_DATA = <?!= productDataJson ?>;


let lastReply = "";
var currentProducts = []; // kept for backward compat
var currentSections = [{ id:0, date:"", room:"", activity:"", products:[] }];
var sectionIdCounter = 1;
let timelineDays = { setup: [], takedown: [] };
let suggestProducts = true;

function toggleSuggest(){
  suggestProducts = !suggestProducts;
  document.getElementById("suggestDot").style.background = suggestProducts ? "#22c55e" : "#d1d5db";
  document.getElementById("suggestLabel").textContent = suggestProducts ? "Møbelforslag til" : "Møbelforslag fra";
  document.getElementById("suggestToggle").style.color = suggestProducts ? "#374151" : "#9ca3af";
}

function analyse(){
  const email = document.getElementById("emailIn").value.trim();
  if(!email){alert("Indsæt venligst en e-mail først.");return;}
  document.getElementById("err").classList.add("hidden");
  document.getElementById("results").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("clearBtn").style.display="";
  google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onError).analyseEmail(email);
}

function onSuccess(data){
  data = JSON.parse(data);
  document.getElementById("loading").classList.add("hidden");
  renderMatrix(data.fields, FIELD_DEFS);
  if(data.eventDays && data.eventDays >= 1){
    document.getElementById("rentalDays").value = data.eventDays;
  }
  if(suggestProducts) renderPriceCalc(data.fields.productSuggestions?.value);
  autoFillTimeline(data.fields);
  const webshopUrl = "https://www.party.rent/da/webshop";
  lastReply = data.emailReply.replace("WEBSHOP_LINK", webshopUrl);
  const linkedReply = data.emailReply.replace(
    "WEBSHOP_LINK",
    '<a href="' + webshopUrl + '" target="_blank" style="color:inherit">europæiske sortiment</a>'
  );
  document.getElementById("emailOut").innerHTML = linkedReply.replace(/\n/g, "<br>");
  document.getElementById("results").classList.remove("hidden");
}

function onError(err){
  document.getElementById("loading").classList.add("hidden");
  const b = document.getElementById("err");
  b.textContent = T('errPrefix') + (err.message || err);
  b.classList.remove("hidden");
}

  currentLang = lang;
  document.getElementById('langDa').style.fontWeight = lang==='da'?'700':'400';
  document.getElementById('langEn').style.fontWeight = lang==='en'?'700':'400';
  applyStrings();
}

function applyStrings(){
  document.querySelectorAll('[data-t]').forEach(function(el){
    el.textContent = T(el.getAttribute('data-t'));
  });
  var ei = document.getElementById('emailIn');
  if(ei) ei.placeholder = T('emailPlaceholder');
  var ld = document.getElementById('loading');
  if(ld) ld.innerHTML = '<div class="spinner"></div>'+T('loadingText');
  renderSections();
  renderTimelineRows();
}

function capFirst(s){
  if(!s) return s;
  return String(s).split('\n').map(function(l){ return l ? l.charAt(0).toUpperCase()+l.slice(1) : l; }).join('\n');
}

function renderMatrix(fields, fieldDefs){
  var matrix = document.getElementById("matrix");
  matrix.innerHTML = "";
  var ok=0, partial=0, missing=0;

  fieldDefs.forEach(function(f){
    // Vis kun conditional felter hvis kunden ønsker selvopstilling
    if(f.conditional){
      var condInfo = fields[f.conditional];
      var condVal = (condInfo && condInfo.value) ? String(condInfo.value).toLowerCase() : "";
      if(!condVal.match(/\b(ja|yes|selv)\b/)) return;
    }

    var card = document.createElement("div");
    var fLabel = typeof f.label==='object' ? (f.label[currentLang]||f.label.da) : f.label;

    if(f.grouped){
      var allOk=true, anyPresent=false;
      var rowsHtml = f.grouped.map(function(sub){
        var info = fields[sub.key] || {value:null,status:"missing"};
        var s = info.status||"missing";
        if(s==="ok"){ ok++; anyPresent=true; }
        else if(s==="partial"){ partial++; anyPresent=true; allOk=false; }
        else { missing++; allOk=false; }
        var val = info.value ? capFirst(String(info.value)) : T('notSpecified');
        var vc = info.value ? "" : "empty";
        var subLbl = typeof sub.subLabel==='object' ? (sub.subLabel[currentLang]||sub.subLabel.da) : sub.subLabel;
        return '<div style="display:flex;gap:8px;padding:.25rem 0;border-bottom:1px solid #f5f3f0;align-items:baseline">' +
          '<span style="font-size:11px;color:#aaa;min-width:110px;flex-shrink:0">'+subLbl+'</span>' +
          '<span class="fv '+vc+'" style="font-size:13px">'+val+'</span>' +
          '</div>';
      }).join('');
      var gs = !anyPresent?"missing":(allOk?"ok":"partial");
      var bc = gs==="ok"?"bok":gs==="partial"?"bpa":"bmi";
      var bch = gs==="ok"?"✓":gs==="partial"?"?":"✕";
      card.className = "fc "+gs;
      card.innerHTML = '<div class="fl"><span class="badge '+bc+'">'+bch+'</span>'+fLabel+'</div>'+rowsHtml;

    } else {
      var info = fields[f.key]||{value:null,status:"missing"};
      var s = info.status||"missing";
      if(s==="ok") ok++; else if(s==="partial") partial++; else missing++;
      card.className = "fc "+s;
      var bc2 = s==="ok"?"bok":s==="partial"?"bpa":"bmi";
      var bch2 = s==="ok"?"✓":s==="partial"?"?":"✕";
      var val2 = info.value?capFirst(String(info.value)):T('notSpecified');
      var vc2 = info.value?"":"empty";
      var valueHtml;
      if(f.key==="productSuggestions"&&info.value){
        var raw = String(info.value);
        var hasSec = /\[[^\]]+\]\s*:/.test(raw);
        if(hasSec){
          var secHtml = "";
          var sp = /\[([^\]]+)\]\s*:\s*([^;[]*)/g; var sm;
          while((sm=sp.exec(raw))!==null){
            var hdr=sm[1].split('|').map(function(p){return p.replace(/^\w+:\s*/,'');}).join(' · ');
            var prods=sm[2].trim().replace(/;\s*$/,'').split(/,\s*/);
            secHtml+='<div style="font-size:12px;font-weight:600;color:#555;margin-top:.4rem">'+hdr+'</div>'+
              '<ul style="padding-left:1rem;margin:0 0 .2rem;line-height:1.8">'+
              prods.filter(function(p){return /Art\./i.test(p);}).map(function(it){return '<li style="font-size:13px">'+it.trim()+'</li>';}).join("")+'</ul>';
          }
          valueHtml=secHtml;
        } else {
          var items=raw.split(/,\s*/);
          valueHtml='<ul style="padding-left:1rem;margin:0;line-height:1.8">'+
            items.filter(function(it){return /Art\./i.test(it);}).map(function(it){return '<li style="font-size:13px">'+it+'</li>';}).join("")+'</ul>';
        }
      } else if(f.key==="furnitureItems"&&info.value){
        var bullets=String(info.value).split(/[,;]+/).map(function(b){return b.trim();}).filter(Boolean);
        valueHtml= bullets.length > 1
          ? '<ul style="padding-left:1.1rem;margin:.1rem 0;line-height:1.9">'+
            bullets.map(function(b){return '<li style="font-size:14px">'+capFirst(b)+'</li>';}).join('')+'</ul>'
          : '<div class="fv" style="font-size:14px">'+capFirst(String(info.value))+'</div>';
      } else if(f.key==="catalogueComments"&&info.value){
        var paras=String(info.value).split(/\s+[—–]\s+/);
        valueHtml='<div style="display:flex;flex-direction:column;gap:.55rem">'+
          paras.map(function(p){
            p=p.trim();
            return p?'<div class="fv" style="font-size:13px;line-height:1.6;padding:.35rem .5rem;background:#f9f9f9;border-radius:6px;border-left:3px solid #e0e0e0">'+capFirst(p)+'</div>':'';
          }).join('')+'</div>';
      } else if(f.key==="setupTeardown"&&info.value){
        var lines=String(info.value).split(/(?=Nedtagning)/i);
        valueHtml=lines.map(function(l){return '<div class="fv" style="font-size:14px">'+capFirst(l.trim())+'</div>';}).join('');
      } else {
        valueHtml='<div class="fv '+vc2+'">'+val2+'</div>';
      }
      card.innerHTML='<div class="fl"><span class="badge '+bc2+'">'+bch2+'</span>'+fLabel+'</div>'+valueHtml;
    }
    matrix.appendChild(card);
  });

  document.getElementById("sumbar").innerHTML=
    '<span class="sum"><span class="badge bok">✓</span><strong>'+ok+'</strong> '+T('confirmed')+'</span>'+
    '<span class="sum"><span class="badge bpa">?</span><strong>'+partial+'</strong> '+T('unclear')+'</span>'+
    '<span class="sum"><span class="badge bmi">✕</span><strong>'+missing+'</strong> '+T('missing')+'</span>';
}

function renderPriceCalc(suggestions){
  if(!suggestions) return;

  function parseProductItem(item){
    item = item.trim();
    if(!item) return null;
    var artMatch = item.match(/Art\.([A-Za-z0-9+]+)/);
    var artNr = artMatch ? artMatch[1] : null;
    if(!artNr) return null; // skip lines without Art.nr (notes/comments)
    var pdData = PRODUCT_DATA[artNr] || null;
    var price = pdData ? pdData.p : null;
    if(!price){ var pm=item.match(/DKK\s+(\d+)/); price=pm?parseInt(pm[1]):null; }
    var qtyMatch = item.match(/x(\d+)/i);
    var suggestedQty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
    var name = item.replace(/\s*Art\.\S+/gi,'').replace(/\s*DKK\s*\d+/gi,'').replace(/\s*x\d+/gi,'').trim();
    return { name:name, artNr:artNr, price:price, qty:suggestedQty,
      stock:pdData?pdData.s:null, weight:pdData?pdData.w:0,
      volume:pdData?pdData.v:0, cleaning:pdData?pdData.c:0 };
  }

  var sections = [];
  var hasSections = /\[[^\]]+\]\s*:/.test(suggestions);

  if(hasSections){
    var sectionPattern = /\[([^\]]+)\]\s*:\s*([^;[]*)/g;
    var m;
    while((m = sectionPattern.exec(suggestions)) !== null){
      var header = m[1];
      var productStr = m[2].trim().replace(/;\s*$/, '');
      var datePart = "", roomPart = "", activityPart = "";
      header.split('|').forEach(function(part){
        part = part.trim();
        if(/^Dato:/i.test(part))      datePart = part.replace(/^Dato:\s*/i,'').trim();
        else if(/^Lokale:/i.test(part)) roomPart = part.replace(/^Lokale:\s*/i,'').trim();
        else if(/^Aktivitet:/i.test(part)) activityPart = part.replace(/^Aktivitet:\s*/i,'').trim();
      });
      var products = productStr.split(/,\s*/).map(parseProductItem).filter(Boolean);
      sections.push({ id:sections.length, date:datePart, room:roomPart, activity:activityPart, products:products });
    }
  }

  if(!sections.length){
    var products = suggestions.split(/,\s*/).map(parseProductItem).filter(Boolean);
    sections = [{ id:0, date:"", room:"", activity:"", products:products }];
  }

  currentSections = sections;
  sectionIdCounter = sections.length;
  currentProducts = sections[0].products; // backward compat
  renderSections();
  document.getElementById("priceCard").classList.remove("hidden");
  updateTotal();
}

function renderPriceTable(){ renderSections(); }

function calcSectionTotal(si){
  var sec = currentSections[si];
  if(!sec) return 0;
  var days = parseInt(document.getElementById("rentalDays").value)||1;
  var factor = calcFactor(days);
  var disc = Math.min(100,Math.max(0,parseFloat(document.getElementById("discount").value)||0));
  var sub = 0;
  sec.products.forEach(function(p){ sub += Math.round((p.price||0)*factor*(p.qty||1)); });
  return Math.round(sub*(1-disc/100));
}

function updateSectionField(si, field, val){
  if(currentSections[si]) currentSections[si][field] = val;
}

function updateSectionQty(si, pi, val){
  if(currentSections[si] && currentSections[si].products[pi]){
    currentSections[si].products[pi].qty = parseInt(val)||0;
  }
  updateTotal();
}

function removeSectionProduct(si, pi){

function removeSection(si){
  currentSections.splice(si,1);
  renderSections();
}

function addSection(){

function addProductToSection(si){
  var artNr = (document.getElementById("addArtNr_"+si)||{}).value;
  var name = (document.getElementById("addName_"+si)||{}).value;
  if(artNr) artNr = artNr.trim();
  if(name) name = name.trim();
  if(!name && !artNr){ alert("Angiv produktnavn eller artikelnummer."); return; }
  var data = artNr ? PRODUCT_DATA[artNr] : null;
  var price = data ? data.p : null;
  var pname = name || ("Art."+artNr);
  currentSections[si].products.push({
    name:pname, artNr:artNr||null, price:price, qty:1,
    stock:data?data.s:null, weight:data?data.w:0, volume:data?data.v:0, cleaning:data?data.c:0
  });
  renderSections();
}

function removeProduct(i){ /* handled by removeSectionProduct */ }

function addProduct(){
  // Add to last section (or first if only one)
  var si = currentSections.length - 1;
  addProductToSection(si);
}

function calcFactor(days){
  if(days<=1) return 1.00;
  if(days===2) return 1.25;
  if(days===3) return 1.40;
  return 1.40+(days-3)*0.15;
}

function timeToMin(t){
  if(!t) return 0;
  const p=t.split(":");
  return parseInt(p[0])*60+parseInt(p[1]||0);
}

function autoFillTimeline(fields){
  var st = (fields.setupTeardown && fields.setupTeardown.value) ? fields.setupTeardown.value : "";
  var ed = (fields.eventDate && fields.eventDate.value) ? fields.eventDate.value : "";
  var months = {januar:1,februar:2,marts:3,april:4,maj:5,juni:6,juli:7,august:8,september:9,oktober:10,november:11,december:12};
  var monthPat = Object.keys(months).join('|');

  function getYear(s){
    var m=(s||"").match(/\b(20\d\d)\b/);
    return m?parseInt(m[1]):new Date().getFullYear();
  }

  function findDates(s, yr){
    var re=new RegExp('(\\d{1,2})[.\\s]+('+monthPat+')','gi');
    var res=[],m;
    while((m=re.exec(s))!==null){
      var mn=months[m[2].toLowerCase()];
      if(mn) res.push(yr+"-"+String(mn).padStart(2,"0")+"-"+String(parseInt(m[1])).padStart(2,"0"));
    }
    return res.filter(function(v,i,a){return a.indexOf(v)===i;}).sort();
  }

  function findDateTimePairs(s, yr, defaultStart, defaultEnd){
    // Step 1: find all date positions
    var dateRe=new RegExp('(\\d{1,2})[.\\s]+('+monthPat+')','gi');
    var dateMatches=[], dm, seen={};
    while((dm=dateRe.exec(s))!==null){
      var mn=months[dm[2].toLowerCase()];
      if(!mn) continue;
      var date=yr+"-"+String(mn).padStart(2,"0")+"-"+String(parseInt(dm[1])).padStart(2,"0");
      if(seen[date]) continue;
      seen[date]=true;
      dateMatches.push({date:date, pos:dm.index, end:dm.index+dm[0].length});
    }
    // Step 2: for each date, extract time from the text up to the next date
    return dateMatches.map(function(d,i){
      var nextPos=i<dateMatches.length-1 ? dateMatches[i+1].pos : s.length;
      var ctx=s.substring(d.end, nextPos);
      var start=defaultStart, end=defaultEnd;
      var rangeM=ctx.match(/kl\.?\s*(\d{1,2})(?:[:.]\d{2})?\s*[-–]\s*(\d{1,2})(?:[:.]\d{2})?/i);
      var indenM=ctx.match(/inden\s+kl\.?\s*(\d{1,2})(?:[:.]\d{2})?/i);
      var fraM=ctx.match(/fra\s+kl\.?\s*(\d{1,2})(?:[:.]\d{2})?/i);
      if(rangeM){
        start=String(parseInt(rangeM[1])).padStart(2,"0")+":00";
        end=String(parseInt(rangeM[2])).padStart(2,"0")+":00";
      } else if(indenM){
        end=String(parseInt(indenM[1])).padStart(2,"0")+":00";
      } else if(fraM){
        start=String(parseInt(fraM[1])).padStart(2,"0")+":00";
      }
      return {date:d.date, start:start, end:end};
    });
  }

  var yr = getYear(ed) || getYear(st);
  var eventDates = findDates(ed, yr);
  var stL = st.toLowerCase();
  var splitIdx = stL.indexOf("nedtagning");
  var setupPart = splitIdx>=0 ? st.substring(0, splitIdx) : st;
  var tdPart    = splitIdx>=0 ? st.substring(splitIdx) : "";

  if(setupPart.toLowerCase().indexOf("dagen f")>=0 && eventDates.length){
    var d=new Date(eventDates[0]); d.setDate(d.getDate()-1);
    timelineDays.setup=[{date:d.toISOString().split("T")[0], start:"09:00", end:"16:00"}];
  } else {
    timelineDays.setup = findDateTimePairs(setupPart, yr, "09:00", "16:00");
    if(!timelineDays.setup.length && eventDates.length)
      timelineDays.setup=[{date:eventDates[0], start:"09:00", end:"16:00"}];
  }

  if(tdPart.toLowerCase().indexOf("dagen efter")>=0 && eventDates.length){
    var d2=new Date(eventDates[eventDates.length-1]); d2.setDate(d2.getDate()+1);
    timelineDays.takedown=[{date:d2.toISOString().split("T")[0], start:"16:00", end:"19:00"}];
  } else {
    timelineDays.takedown = findDateTimePairs(tdPart, yr, "16:00", "19:00");
    if(!timelineDays.takedown.length && eventDates.length)
      timelineDays.takedown=[{date:eventDates[eventDates.length-1], start:"16:00", end:"19:00"}];
  }

  renderTimelineRows();
}

function updateTimeline(){
  var tl=document.getElementById("timeline");
  if(!tl) return;
  var allDays=[];
  timelineDays.setup.forEach(function(d){ allDays.push({date:d.date,start:d.start,end:d.end,type:'setup'}); });
  timelineDays.takedown.forEach(function(d){ allDays.push({date:d.date,start:d.start,end:d.end,type:'takedown'}); });
  if(!allDays.length){ tl.innerHTML=""; return; }

  var allMins=[];
  allDays.forEach(function(d){ allMins.push(timeToMin(d.start)); allMins.push(timeToMin(d.end)); });
  var minMin=Math.min.apply(null,allMins);
  var maxMin=Math.max.apply(null,allMins);
  var startHour=Math.max(0,Math.floor(minMin/60)-1);
  var endHour=Math.min(24,Math.ceil(maxMin/60)+1);
  var totalMin=(endHour-startHour)*60;

  function pct(min){ return ((min-startHour*60)/totalMin*100).toFixed(2)+"%"; }
  function wid(a,b){ return ((b-a)/totalMin*100).toFixed(2)+"%"; }
  function fmtDate(d){ if(!d) return ""; var p=d.split("-"); return p[2]+"."+p[1]+"."+p[0]; }

  var lw="100px";
  var html="";
  html+='<div style="display:flex"><div style="width:'+lw+';flex-shrink:0"></div>';
  html+='<div style="flex:1;position:relative;height:22px;background:#f8f7f3;border:1px solid #e8e6e0;border-bottom:none;border-radius:6px 6px 0 0">';
  for(var h=startHour;h<=endHour;h++)
    html+='<span style="position:absolute;left:'+pct(h*60)+';transform:translateX(-50%);font-size:10px;color:#999;top:5px">'+String(h).padStart(2,'0')+':00</span>';
  html+='</div></div>';

  allDays.forEach(function(day,idx){
    var isSetup=day.type==='setup';
    var bg=isSetup?'#dcfce7':'#fed7aa';
    var tc=isSetup?'#15803d':'#c2410c';
    var label=isSetup?T('labelSetup'):T('labelTakedown');
    var ss=timeToMin(day.start),se=timeToMin(day.end);
    var isLast=idx===allDays.length-1;
    html+='<div style="display:flex"><div style="width:'+lw+';flex-shrink:0;font-size:11px;color:#555;display:flex;align-items:center;padding-right:8px">'+fmtDate(day.date)+'</div>';
    html+='<div style="flex:1;position:relative;height:32px;border:1px solid #e8e6e0;'+(isLast?'border-radius:0 0 6px 6px':'border-bottom:none')+';background:#fff">';
    html+='<div style="position:absolute;left:'+pct(ss)+';width:'+wid(ss,se)+';height:100%;background:'+bg+';display:flex;align-items:center;justify-content:center">';
    html+='<span style="font-size:10px;font-weight:700;color:'+tc+';letter-spacing:.06em;text-transform:uppercase">'+label+'</span></div>';
    html+='</div></div>';
  });
  tl.innerHTML=html;
}

function updateTotal(){
  var days=parseInt(document.getElementById("rentalDays").value)||1;
  var discount=Math.min(100,Math.max(0,parseFloat(document.getElementById("discount").value)||0));
  var factor=calcFactor(days);
  document.getElementById("factorDisplay").textContent="Faktor: "+factor.toFixed(2).replace(".",",")+("x");
  var subtotal=0,totalCleaning=0,totalWeight=0,totalVolume=0;
  currentSections.forEach(function(sec,si){
    sec.products.forEach(function(p,pi){
      var price=p.price||0;
      var qty=p.qty||0;
      var sub=Math.round(price*factor*qty);
      subtotal+=sub;
      totalCleaning+=(p.cleaning||0)*qty;
      totalWeight+=(p.weight||0)*qty;
      totalVolume+=(p.volume||0)*qty;
      var cell=document.getElementById("secSub_"+si+"_"+pi);
      if(cell) cell.textContent=price?sub.toLocaleString("da-DK")+" kr.":"—";
    });
  });
  var discountAmt=Math.round(subtotal*discount/100);
  var afterDiscount=subtotal-discountAmt;
  var cleaningTotal=Math.round(totalCleaning);
  var exclVat=afterDiscount+cleaningTotal;
  var inclVat=Math.round(exclVat*1.25);
  document.getElementById("logisticsInfo").innerHTML="⚖ "+totalWeight.toFixed(1)+" kg &nbsp;|&nbsp; 📦 "+totalVolume.toFixed(2)+" m³";
  var dLabel = days===1?T('day'):T('days');
  var summaryHtml='<div class="price-summary-row"><span>'+T('rentalTotal')+' ('+days+' '+dLabel+', '+T('factor')+' '+factor.toFixed(2).replace(".",",")+('x)</span><span>')+subtotal.toLocaleString("da-DK")+' kr.</span></div>';
  if(discount>0) summaryHtml+='<div class="price-summary-row"><span>'+T('discountRow')+' ('+discount+'%)</span><span>− '+discountAmt.toLocaleString("da-DK")+' kr.</span></div>';
  if(cleaningTotal>0) summaryHtml+='<div class="price-summary-row"><span>'+T('cleaning')+'</span><span>'+cleaningTotal.toLocaleString("da-DK")+' kr.</span></div>';
  summaryHtml+='<div class="price-summary-row total"><span>'+T('totalExclVat')+'</span><span>'+exclVat.toLocaleString("da-DK")+' kr.</span></div>'+'<div class="price-summary-row vat"><span>'+T('totalInclVat')+'</span><span>'+inclVat.toLocaleString("da-DK")+' kr.</span></div>';
  document.getElementById("priceSummary").innerHTML=summaryHtml;
  updateTimeline();
}

function copyEmail(){
  var text=document.getElementById("emailOut").innerText;
  navigator.clipboard.writeText(text).then(function(){
    var b=document.getElementById("copyBtn");
    b.textContent=T('copiedBtn');
    setTimeout(function(){b.textContent=T('copyBtn');},2000);
  });
}

function loadFile(event){
  var file=event.target.files[0];
  if(!file) return;
  if(file.name.match(/\.pdf$/i)){
    var reader=new FileReader();
    reader.onload=function(e){
      var bytes=new Uint8Array(e.target.result);
      var binary='';
      bytes.forEach(function(b){binary+=String.fromCharCode(b);});
      var base64=btoa(binary);
      document.getElementById("loading").classList.remove("hidden");
      google.script.run
        .withSuccessHandler(function(text){
          document.getElementById("loading").classList.add("hidden");
          document.getElementById("emailIn").value=text;
          document.getElementById("clearBtn").style.display="";
        })
        .withFailureHandler(function(err){
          document.getElementById("loading").classList.add("hidden");
          alert("Kunne ikke læse PDF: "+(err.message||err));
        })
        .extractPDFText(base64);
    };
    reader.readAsArrayBuffer(file);
    event.target.value="";
    return;
  }
  if(file.name.match(/\.xlsx?$/i)){
    var reader2=new FileReader();
    reader2.onload=function(e){
      var wb=XLSX.read(e.target.result,{type:"array"});
      var rows=XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]);
      document.getElementById("emailIn").value=rows;
      document.getElementById("clearBtn").style.display="";
    };
    reader2.onerror=function(){alert("Kunne ikke læse filen.");};
    reader2.readAsArrayBuffer(file);
  } else {
    var reader3=new FileReader();
    reader3.onload=function(e){
      document.getElementById("emailIn").value=e.target.result;
      document.getElementById("clearBtn").style.display="";
    };
    reader3.onerror=function(){alert("Kunne ikke læse filen.");};
    reader3.readAsText(file,"UTF-8");
  }
  event.target.value="";
}
